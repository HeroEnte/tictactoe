<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 0.4rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.15rem;
      margin-bottom: 1.4rem;
      min-height: 1.6em;
      color: #a8dadc;
      letter-spacing: 0.5px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 18px rgba(233, 69, 96, 0.6);
    }

    #restart {
      margin-top: 1.6rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, color 0.15s;
    }

    #restart:hover {
      background: #e94560;
      color: #fff;
    }

    #scores {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.2rem;
      font-size: 1rem;
      color: #aaa;
    }

    #scores span { font-weight: bold; }
    #scores .sx { color: #e94560; }
    #scores .so { color: #a8dadc; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="scores">
    <div>X: <span class="sx" id="scoreX">0</span></div>
    <div>Draws: <span id="scoreD">0</span></div>
    <div>O: <span class="so" id="scoreO">0</span></div>
  </div>
  <div id="status">Player X's turn</div>
  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>
  <button id="restart">Restart</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    let board, current, over, scores = {X:0, O:0, D:0};

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    function init() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "Player X's turn";
    }

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[b] === board[c])
          return [a, b, c];
      }
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add('taken', current.toLowerCase());

        const win = checkWin();
        if (win) {
          win.forEach(idx => cells[idx].classList.add('win'));
          status.textContent = `Player ${current} wins!`;
          scores[current]++;
          document.getElementById('score' + current).textContent = scores[current];
          over = true;
        } else if (board.every(Boolean)) {
          status.textContent = "It's a draw!";
          scores.D++;
          document.getElementById('scoreD').textContent = scores.D;
          over = true;
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `Player ${current}'s turn`;
        }
      });
    });

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
