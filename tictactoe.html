<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe ♥</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .screen { display: none; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    .card {
      background: #16213e;
      padding: 2.5rem 3rem;
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(233,69,96,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
    }

    h1 { font-size: 2rem; color: #e94560; letter-spacing: 2px; }

    .love-note { font-size: 0.9rem; color: #a8dadc; font-style: italic; }

    input[type="text"] {
      padding: 0.65rem 1.2rem;
      font-size: 1rem;
      border: 2px solid #0f3460;
      background: #1a1a2e;
      color: #eee;
      border-radius: 8px;
      width: 250px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #e94560; }

    .btn {
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, color 0.15s;
      width: 250px;
    }
    .btn:hover:not(:disabled) { background: #e94560; color: #fff; }
    .btn:disabled { opacity: 0.45; cursor: default; }
    .btn.alt { border-color: #a8dadc; color: #a8dadc; }
    .btn.alt:hover:not(:disabled) { background: #a8dadc; color: #1a1a2e; }

    .error { font-size: 0.88rem; color: #e94560; min-height: 1.2em; text-align: center; }
    .info { font-size: 0.88rem; color: #a8dadc; text-align: center; line-height: 1.6; }

    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      color: #555;
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #0f3460;
    }

    .code-box {
      background: #0f3460;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-size: 2rem;
      letter-spacing: 8px;
      font-weight: bold;
      color: #e94560;
      text-align: center;
      width: 250px;
    }

    .link-row {
      display: flex;
      gap: 0.5rem;
      width: 250px;
    }
    .link-row input {
      flex: 1;
      font-size: 0.72rem;
      padding: 0.5rem 0.7rem;
      text-align: left;
      width: auto;
    }
    .link-row button {
      padding: 0.5rem 0.9rem;
      border: 2px solid #a8dadc;
      background: transparent;
      color: #a8dadc;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .link-row button:hover { background: #a8dadc; color: #1a1a2e; }

    .dots {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #a8dadc;
      font-size: 0.9rem;
    }
    .dot {
      width: 7px; height: 7px;
      background: #a8dadc;
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── GAME ── */
    #gameScreen { gap: 0.7rem; }

    .game-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .role-badge { font-size: 0.85rem; color: #aaa; }

    #scores {
      display: flex;
      gap: 2rem;
      font-size: 0.95rem;
      color: #aaa;
    }
    .sx { color: #e94560; font-weight: bold; }
    .so { color: #a8dadc; font-weight: bold; }

    #gameStatus {
      font-size: 1.1rem;
      min-height: 1.5em;
      text-align: center;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }
    .cell:hover:not(.taken):not(.blocked) { background: #0f3460; transform: scale(1.05); }
    .cell.taken, .cell.blocked { cursor: default; }
    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }
    .cell.win { background: #0f3460; box-shadow: 0 0 18px rgba(233,69,96,0.55); }

    .love-footer {
      font-size: 0.82rem;
      color: #a8dadc;
      font-style: italic;
      opacity: 0.55;
      margin-top: 0.3rem;
    }
  </style>
</head>
<body>

  <!-- ── LOBBY ── -->
  <div id="lobbyScreen" class="screen active">
    <div class="card">
      <h1>TIC TAC TOE</h1>
      <p class="love-note">Ich liebe dich, Alina :)</p>

      <div id="choicePanel" style="display:flex;flex-direction:column;align-items:center;gap:0.9rem;width:100%;">
        <p class="info">Start a game and share the code,<br>or join your partner's game.</p>
        <button class="btn" onclick="createGame()">Create Game</button>
        <div class="divider">or</div>
        <input type="text" id="codeInput" placeholder="Enter room code" maxlength="6"
               oninput="this.value=this.value.toUpperCase()" autocomplete="off" />
        <button class="btn alt" onclick="joinFromInput()">Join Game</button>
        <div class="error" id="joinError"></div>
      </div>

      <div id="waitingPanel" style="display:none;flex-direction:column;align-items:center;gap:0.9rem;">
        <p class="info">Share this code with your partner:</p>
        <div class="code-box" id="codeDisplay"></div>
        <p class="info" style="font-size:0.78rem;">or share this link:</p>
        <div class="link-row">
          <input type="text" id="shareLinkInput" readonly />
          <button onclick="copyLink(this)">Copy</button>
        </div>
        <div class="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          <span>Waiting for partner…</span>
        </div>
      </div>

      <div id="connectingPanel" style="display:none;flex-direction:column;align-items:center;gap:0.9rem;">
        <div class="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          <span>Connecting…</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── GAME ── -->
  <div id="gameScreen" class="screen">
    <div class="game-top">
      <h1>TIC TAC TOE</h1>
      <p class="role-badge">You are: <b id="roleBadge"></b></p>
    </div>
    <div id="scores">
      <div>X: <span class="sx" id="scoreX">0</span></div>
      <div>Draws: <span id="scoreD">0</span></div>
      <div>O: <span class="so" id="scoreO">0</span></div>
    </div>
    <div id="gameStatus"></div>
    <div id="board">
      <div class="cell" data-i="0"></div><div class="cell" data-i="1"></div><div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div><div class="cell" data-i="4"></div><div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div><div class="cell" data-i="7"></div><div class="cell" data-i="8"></div>
    </div>
    <button class="btn" id="playAgainBtn" onclick="voteRestart()"
            style="display:none;margin-top:1rem;width:250px;">Play Again</button>
    <p class="love-footer">Ich liebe dich, Alina :)</p>
  </div>

  <script>
    // ── FIREBASE ──────────────────────────────────
    firebase.initializeApp({
      apiKey: "AIzaSyDDGlS6BqXh9jKJFF7gCjZk0Oz_TY8YQ-0",
      authDomain: "tictactoe-27e1f.firebaseapp.com",
      databaseURL: "https://tictactoe-27e1f-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "tictactoe-27e1f",
      storageBucket: "tictactoe-27e1f.firebasestorage.app",
      messagingSenderId: "346491644369",
      appId: "1:346491644369:web:0ee6a60f03f642879558f0"
    });
    const db = firebase.database();

    // ── STATE ─────────────────────────────────────
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const cells = document.querySelectorAll('.cell');
    let myRole    = null;   // 'X' | 'O'
    let roomRef   = null;
    let inGame    = false;
    let lastResult = null;  // track to avoid double-counting scores
    const scores  = { X: 0, O: 0, D: 0 };

    // ── HELPERS ───────────────────────────────────
    function show(id) {
      ['lobbyScreen','gameScreen'].forEach(s =>
        document.getElementById(s).classList.toggle('active', s === id));
    }

    function setStatus(msg, color) {
      const el = document.getElementById('gameStatus');
      el.textContent = msg;
      el.style.color = color || '#a8dadc';
    }

    function blockBoard(on) {
      cells.forEach(c => c.classList.toggle('blocked', on));
    }

    function generateCode() {
      // Unambiguous characters (no I, O, 0, 1)
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
      return code;
    }

    function copyLink(btn) {
      const val = document.getElementById('shareLinkInput').value;
      navigator.clipboard.writeText(val).catch(() => {
        const t = document.createElement('textarea');
        t.value = val; document.body.appendChild(t); t.select();
        document.execCommand('copy'); document.body.removeChild(t);
      });
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    }

    function checkWin(board) {
      for (const [a,b,c] of WINS)
        if (board[a] && board[a] === board[b] && board[b] === board[c]) return [a,b,c];
      return null;
    }

    // ── LOBBY ─────────────────────────────────────
    async function createGame() {
      const code = generateCode();
      roomRef = db.ref('rooms/' + code);

      await roomRef.set({
        c0:'',c1:'',c2:'',c3:'',c4:'',c5:'',c6:'',c7:'',c8:'',
        turn: 'X',
        xOnline: true,
        oOnline: false,
        result: '',
        restartX: false,
        restartO: false
      });

      myRole = 'X';
      roomRef.child('xOnline').onDisconnect().set(false);

      document.getElementById('choicePanel').style.display = 'none';
      document.getElementById('waitingPanel').style.display = 'flex';
      document.getElementById('codeDisplay').textContent = code;
      document.getElementById('shareLinkInput').value =
        location.origin + location.pathname + '?join=' + code;

      roomRef.on('value', onRoomUpdate);

      // Re-announce presence on reconnect
      db.ref('.info/connected').on('value', snap => {
        if (snap.val() && roomRef && myRole === 'X') {
          roomRef.child('xOnline').set(true);
          roomRef.child('xOnline').onDisconnect().set(false);
        }
      });
    }

    function joinFromInput() {
      const code = document.getElementById('codeInput').value.trim().toUpperCase();
      if (code.length !== 6) {
        document.getElementById('joinError').textContent = 'Code must be 6 characters.';
        return;
      }
      joinGame(code);
    }

    async function joinGame(code) {
      code = code.toUpperCase();
      document.getElementById('choicePanel').style.display = 'none';
      document.getElementById('connectingPanel').style.display = 'flex';

      roomRef = db.ref('rooms/' + code);
      let snap;
      try { snap = await roomRef.once('value'); }
      catch {
        resetLobby('Connection failed. Check your internet.');
        return;
      }

      if (!snap.exists()) { resetLobby('Room not found. Check the code.'); return; }

      const data = snap.val();
      if (data.oOnline) { resetLobby('Room is already full.'); return; }

      myRole = 'O';
      await roomRef.update({ oOnline: true });
      roomRef.child('oOnline').onDisconnect().set(false);

      db.ref('.info/connected').on('value', snap => {
        if (snap.val() && roomRef && myRole === 'O') {
          roomRef.child('oOnline').set(true);
          roomRef.child('oOnline').onDisconnect().set(false);
        }
      });

      enterGame();
      roomRef.on('value', onRoomUpdate);
    }

    function resetLobby(errMsg) {
      document.getElementById('connectingPanel').style.display = 'none';
      document.getElementById('choicePanel').style.display = 'flex';
      document.getElementById('joinError').textContent = errMsg;
    }

    function enterGame() {
      inGame = true;
      const badge = document.getElementById('roleBadge');
      badge.textContent = myRole;
      badge.style.color = myRole === 'X' ? '#e94560' : '#a8dadc';
      show('gameScreen');
    }

    // ── ROOM LISTENER ─────────────────────────────
    function onRoomUpdate(snap) {
      const data = snap.val();
      if (!data) return;

      // X waits here until O joins
      if (myRole === 'X' && data.oOnline && !inGame) enterGame();
      if (!inGame) return;

      const board = [data.c0,data.c1,data.c2,data.c3,data.c4,data.c5,data.c6,data.c7,data.c8];
      const win   = checkWin(board);

      // Render cells
      cells.forEach((cell, i) => {
        const v = board[i];
        cell.className = 'cell' + (v ? ' taken ' + v.toLowerCase() : '');
        cell.textContent = v;
        if (win && win.includes(i)) cell.classList.add('win');
      });

      // Partner disconnected
      const partnerOnline = myRole === 'X' ? data.oOnline : data.xOnline;
      if (!partnerOnline) {
        setStatus('Partner disconnected.', '#aaa');
        blockBoard(true);
        document.getElementById('playAgainBtn').style.display = 'none';
        return;
      }

      // Score update (fires once per result change)
      if (data.result && data.result !== lastResult) {
        lastResult = data.result;
        if (data.result === 'draw') {
          scores.D++;
          document.getElementById('scoreD').textContent = scores.D;
        } else {
          scores[data.result]++;
          document.getElementById('score' + data.result).textContent = scores[data.result];
        }
      }
      if (!data.result && lastResult) lastResult = null;

      // Game over state
      if (data.result) {
        const btn = document.getElementById('playAgainBtn');
        btn.style.display = 'block';

        if (data.result === 'draw')      setStatus("It's a draw!", '#a8dadc');
        else if (data.result === myRole) setStatus('You win! 🎉', '#e94560');
        else                             setStatus('Partner wins!', '#aaa');

        if (data.restartX && data.restartO) {
          // Both agreed — X does the reset write
          if (myRole === 'X') {
            roomRef.update({
              c0:'',c1:'',c2:'',c3:'',c4:'',c5:'',c6:'',c7:'',c8:'',
              turn:'X', result:'', restartX:false, restartO:false
            });
          }
          btn.textContent = 'Play Again';
          btn.disabled = false;
        } else {
          const myVote = myRole === 'X' ? data.restartX : data.restartO;
          btn.textContent = myVote ? 'Waiting for partner…' : 'Play Again';
          btn.disabled    = !!myVote;
        }

        blockBoard(true);
        return;
      }

      // Active game
      document.getElementById('playAgainBtn').style.display = 'none';
      if (data.turn === myRole) {
        setStatus('Your turn!', myRole === 'X' ? '#e94560' : '#a8dadc');
        blockBoard(false);
      } else {
        setStatus("Partner's turn…", '#aaa');
        blockBoard(true);
      }
    }

    // ── MOVE ──────────────────────────────────────
    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        if (!inGame || cell.classList.contains('taken') || cell.classList.contains('blocked')) return;
        const i = +cell.dataset.i;

        // Optimistically block board to prevent double-clicks before Firebase confirms
        blockBoard(true);

        const newBoard = Array.from(cells).map((c, j) => j === i ? myRole : (c.textContent || ''));
        const update   = { [`c${i}`]: myRole };
        const win      = checkWin(newBoard);

        if      (win)                  update.result = myRole;
        else if (newBoard.every(Boolean)) update.result = 'draw';
        else    update.turn = myRole === 'X' ? 'O' : 'X';

        roomRef.update(update);
      });
    });

    // ── RESTART ───────────────────────────────────
    function voteRestart() {
      roomRef.update({ [myRole === 'X' ? 'restartX' : 'restartO']: true });
    }

    // ── AUTO-JOIN FROM URL ────────────────────────
    const joinCode = new URLSearchParams(location.search).get('join');
    if (joinCode) {
      document.getElementById('codeInput').value = joinCode.toUpperCase();
      joinGame(joinCode);
    }
  </script>
</body>
</html>
